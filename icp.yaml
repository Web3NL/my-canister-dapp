# yaml-language-server: $schema=https://github.com/dfinity/icp-cli/raw/refs/tags/v0.1.0/docs/schemas/icp-yaml-schema.json

canisters:
  - name: icp-dapp-launcher
    recipe:
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        dir: canisters/icp-dapp-launcher/build

  - name: wasm-registry
    recipe:
      type: "@dfinity/rust@v3.0.0"
      configuration:
        package: wasm-registry
        shrink: true
        candid: canisters/wasm-registry/wasm-registry.did

  - name: my-hello-world
    recipe:
      type: "@dfinity/rust@v3.0.0"
      configuration:
        package: my-hello-world
        shrink: true
        candid: examples/my-hello-world/src/backend/my-hello-world.did

  - name: my-notepad
    recipe:
      type: "@dfinity/rust@v3.0.0"
      configuration:
        package: my-notepad
        shrink: true
        candid: examples/my-notepad/src/backend/my-notepad.did

  - name: demos
    recipe:
      type: "@dfinity/rust@v3.0.0"
      configuration:
        package: demos
        shrink: true
        candid: canisters/demos/demos.did

networks:
  - name: local
    mode: managed
    nns: true
    ii: true
    gateway:
      port: 8080
    version: "v12.0.0-2026-03-02-11-09"

environments:
  - name: local
    network: local
    canisters: [icp-dapp-launcher, wasm-registry, my-hello-world, my-notepad, demos]

  - name: mainnet
    network: ic
    canisters: [icp-dapp-launcher, wasm-registry, demos]
