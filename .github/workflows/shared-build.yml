name: Shared Build and Test

on:
  workflow_call:
    inputs:
      include-vite-e2e:
        description: 'Include Vite dev server E2E tests'
        type: boolean
        default: false

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    env:
      # Prefer IPv4 DNS results in Node (affects dev servers, tooling, etc.)
      NODE_OPTIONS: --dns-result-order=ipv4first

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.93.1'
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ hashFiles('rust-toolchain.toml') }}-

      - name: Install icp-cli
        run: npm install -g @icp-sdk/icp-cli @icp-sdk/ic-wasm

      - name: Prefer IPv4 for localhost on runner
        run: |
          set -euxo pipefail
          echo '127.0.0.1 localhost' | sudo tee -a /etc/hosts
          echo 'precedence ::ffff:0:0/96  100' | sudo tee -a /etc/gai.conf
          getent hosts localhost || true

      - name: Build, validate and run tests (E2E)
        # TODO(derive-ii-principal): remove --skip-acceptance before merging
        run: ./validate-and-test-all.sh --skip-acceptance ${{ inputs.include-vite-e2e && '--include-vite-e2e' || '' }}
